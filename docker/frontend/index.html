<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>${CUSTOMER} - ${ENVIRONMENT}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, system-ui, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      color: #fff;
    }
    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      padding: 3rem; border-radius: 1rem;
      text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
    .badge {
      display: inline-block;
      padding: 0.25rem 1rem; border-radius: 999px;
      font-size: 0.875rem; font-weight: 600; text-transform: uppercase;
      background: #e94560; margin-bottom: 1.5rem;
    }
    .info { color: rgba(255,255,255,0.6); font-size: 0.9rem; }
    a { color: #e94560; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">${ENVIRONMENT}</div>
    <h1>Welcome, ${CUSTOMER}</h1>
    <p>Your application is running.</p>
    <p class="info">Stack: Frontend → Backend → PostgreSQL</p>
  </div>
</body>
</html>
